<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Notes App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📝 Smart Notes App</h1>

    <button id="toggleDark">🌙 Dark Mode</button>

    <div class="input-box">
      <input type="text" id="title" placeholder="Enter title">
      <textarea id="content" placeholder="Write your note..."></textarea>
      <button id="addBtn">Add Note</button>
    </div>

    <div id="notesContainer"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modal fade" id="editModal">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Edit Note</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="text" id="editTitle" class="form-control mb-2">
          <textarea id="editContent" class="form-control"></textarea>
        </div>

        <div class="modal-footer">
          <button class="btn btn-primary" onclick="updateNote()">Save</button>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
